name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (syntax)
        run: |
          python -m py_compile main.py
          python -m py_compile src/data_loader.py src/feature_engineering.py src/anomaly_detection.py src/forecasting.py src/pipeline.py
          python -m py_compile dashboard/plotly_dashboard.py

      - name: Run tests
        run: pytest
